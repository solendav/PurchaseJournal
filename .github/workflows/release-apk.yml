# Builds a release APK from the source repo and publishes it
# to a separate public releases repository.
#
# Required repository secrets:
#   RELEASES_REPO          e.g. solendav/PurchaseJournal-apk
#   RELEASES_REPO_TOKEN    PAT (or fine-grained token) with contents:write on the releases repo
#
# Optional repository secrets (prod dart-defines baked into the APK):
#   DART_DEFINES_PROD_JSON  full JSON string matching dart_defines.prod.json
#                           (overrides the committed file when set)
#
# Trigger: push a version tag, e.g. git tag v1.0.0 && git push origin v1.0.0
# Or: Actions → Release APK → Run workflow

name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). Leave empty to use pubspec version."
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(grep -E '^version:' mobile/pubspec.yaml | head -1 | sed -E 's/version:[[:space:]]*([^+]+).*/\1/' | xargs)
            TAG="v${VERSION}"
          fi
          TAG="${TAG#v}"
          TAG="v${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write dart defines
        env:
          DART_DEFINES_PROD_JSON: ${{ secrets.DART_DEFINES_PROD_JSON }}
          RELEASES_REPO_SECRET: ${{ secrets.RELEASES_REPO }}
        run: |
          # Preferred: store the full JSON in a secret (keeps prod keys out of git).
          if [ -n "${DART_DEFINES_PROD_JSON}" ]; then
            printf '%s\n' "${DART_DEFINES_PROD_JSON}" > dart_defines.prod.json
          elif [ -f dart_defines.prod.json ]; then
            echo "Using committed dart_defines.prod.json"
          elif [ -f dart_defines.prod.json.example ]; then
            cp dart_defines.prod.json.example dart_defines.prod.json
            echo "Copied dart_defines.prod.json.example -> dart_defines.prod.json"
          fi

          if [ ! -f dart_defines.prod.json ]; then
            echo "Missing prod dart defines."
            echo "Fix: add Actions secret DART_DEFINES_PROD_JSON (recommended) or commit mobile/dart_defines.prod.json."
            exit 1
          fi
          # Point in-app update checks at the public releases repo.
          python3 - <<'PY'
          import json, os
          path = "dart_defines.prod.json"
          with open(path) as f:
              data = json.load(f)
          releases_repo = os.environ.get("RELEASES_REPO_SECRET", "").strip()
          if releases_repo:
              data["GITHUB_REPO"] = releases_repo
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define-from-file=dart_defines.prod.json

      - name: Name APK artifact
        run: |
          SRC="build/app/outputs/flutter-apk/app-release.apk"
          DEST="build/app/outputs/flutter-apk/purchasejournal.apk"
          cp "$SRC" "$DEST"
          ls -lh "$DEST"

      - name: Publish to public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          RELEASES_REPO: ${{ secrets.RELEASES_REPO }}
          TAG: ${{ steps.meta.outputs.tag }}
        working-directory: .
        run: |
          set -euo pipefail
          if [ -z "${RELEASES_REPO:-}" ] || [ -z "${GH_TOKEN:-}" ]; then
            echo "Set repository secrets RELEASES_REPO and RELEASES_REPO_TOKEN."
            exit 1
          fi

          # GitHub rejects releases on a repo with zero commits (HTTP 422).
          COMMIT_COUNT=$(gh api "repos/${RELEASES_REPO}/commits?per_page=1" --jq 'length' 2>/dev/null || echo "0")
          if [ "${COMMIT_COUNT}" = "0" ]; then
            echo "Releases repo is empty — seeding with README..."
            SEED_DIR=$(mktemp -d)
            pushd "$SEED_DIR" >/dev/null
            git init -b main
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            cat > README.md <<'EOF'
          # Purchase Journal APK

          Public Android APK downloads for Purchase Journal.

          Source code: https://github.com/solendav/PurchaseJournal
          EOF
            git add README.md
            git commit -m "Initialize releases repository"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${RELEASES_REPO}.git"
            git push -u origin main
            popd >/dev/null
            rm -rf "$SEED_DIR"
          fi

          APK="mobile/build/app/outputs/flutter-apk/purchasejournal.apk"
          NOTES="Purchase Journal ${TAG}

          Android APK for Purchase Journal.

          Download \`purchasejournal.apk\`, enable install from unknown sources if prompted, then open the file."

          if gh release view "$TAG" --repo "$RELEASES_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --repo "$RELEASES_REPO" --clobber
          else
            gh release create "$TAG" "$APK" \
              --repo "$RELEASES_REPO" \
              --title "Purchase Journal ${TAG}" \
              --notes "$NOTES"
          fi

          echo "Published: https://github.com/${RELEASES_REPO}/releases/tag/${TAG}"
          echo "APK URL:   https://github.com/${RELEASES_REPO}/releases/download/${TAG}/purchasejournal.apk"
