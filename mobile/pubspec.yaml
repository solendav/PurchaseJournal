name: purchase_journal
description: Purchase journal — record supplier purchases with receipt scanning.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  get_it: ^8.0.3
  shared_preferences: ^2.3.5
  go_router: ^14.6.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  # google_mlkit_text_recognition: ^0.14.0  # disabled — re-enable with scan UI
  cached_network_image: ^3.4.1
  excel: ^4.0.6
  pdf: ^3.11.3
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#1E3A5F"
    theme_color: "#1E3A5F"
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
